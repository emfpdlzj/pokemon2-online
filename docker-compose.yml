services:
  postgres:
    image: postgres:17-alpine
    container_name: pokemon2-postgres
    environment:
      POSTGRES_DB: pokemon2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pokemon2-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pokemon2"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pokemon2-postgres-data:
